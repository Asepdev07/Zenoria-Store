<!DOCTYPE html>
<html>
<head>
  <title>Zenoria Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* HEADER */
    .header {
      background: #020617;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-weight: bold;
      color: #22c55e;
      font-size: 18px;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100%;
      background: #020617;
      padding: 20px;
      transition: 0.3s;
      z-index: 1000;
    }

    .sidebar h2 {
      color: #22c55e;
      margin-bottom: 15px;
    }

    .sidebar div {
      padding: 12px;
      border-radius: 8px;
      margin: 5px 0;
      cursor: pointer;
    }

    .sidebar div:hover {
      background: #1e293b;
    }

    /* CONTENT */
    .container {
      padding: 20px;
    }

    .server-box {
      background: #020617;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid #1e293b;
    }

    .server-box h2 {
      color: #22c55e;
    }

    .info {
      font-size: 14px;
      color: #cbd5f5;
      margin: 3px 0;
    }

    /* CARD MENU */
    .card {
      background: #020617;
      border: 1px solid #1e293b;
      padding: 18px;
      border-radius: 15px;
      margin: 12px 0;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(34,197,94,0.2);
    }

    .card-title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .card-desc {
      font-size: 13px;
      color: #94a3b8;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ZENORIA STORE</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="menu">
  <h2>MENU</h2>
  <div onclick="alert('Profile nanti')">👤 Profile</div>
  <div onclick="alert('Wiki nanti')">📖 Wiki</div>

  <h2>SETTING</h2>
  <div onclick="setColor('#0f172a')">🌑 Default</div>
  <div onclick="setColor('#7f1d1d')">🔴 Merah</div>
  <div onclick="setColor('#ffffff')">⚪ Putih</div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- SERVER INFO -->
  <div class="server-box">
    <h2>ZenoriaMC</h2>
    <div class="info">IP: ZenoriaMC.arqonara.my.id</div>
    <div class="info">Port: 25483</div>
    <div class="info">Status: <span id="status">Loading...</span></div>
    <div class="info">Player: <span id="player">Loading...</span></div>
    <div class="info">Tanggal: <span id="tanggal"></span></div>
  </div>

  <!-- MENU -->
  <div class="card" onclick="window.location.href='./server-store/index.html'">
    <div class="card-title">🛒 Server Store</div>
    <div class="card-desc">Beli rank dan item server</div>
  </div>

  <div class="card" onclick="alert('Vote belum tersedia')">
    <div class="card-title">🗳️ Vote</div>
    <div class="card-desc">Dukung server dengan vote harian</div>
  </div>

  <div class="card" onclick="window.open('https://sociabuzz.com/asepajaweh/tribe')">
    <div class="card-title">💖 Donation</div>
    <div class="card-desc">Support server kami</div>
  </div>

</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
}

// SAVE COLOR
function setColor(color) {
  localStorage.setItem("bg", color);
  location.reload();
}

// LOAD COLOR
let saved = localStorage.getItem("bg");
if (saved) document.body.style.background = saved;

// DATE
document.getElementById("tanggal").innerHTML = new Date().toLocaleDateString();

// API PLAYER
fetch("https://api.mcsrvstat.us/2/ZenoriaMC.arqonara.my.id:25483")
.then(res => res.json())
.then(data => {
  if (data.online) {
    document.getElementById("status").innerHTML = "🟢 Online";
    document.getElementById("player").innerHTML = data.players.online + "/" + data.players.max;
  } else {
    document.getElementById("status").innerHTML = "🔴 Offline";
    document.getElementById("player").innerHTML = "-";
  }
});
</script>

</body>
  </html>
