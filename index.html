<!DOCTYPE html>
<html>
<head>
  <title>ZenoriaMC Store</title>
  <style>
    body {
      background: linear-gradient(to bottom, #020617, #0f172a);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
    }

    .container {
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      width: 260px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .price {
      color: #38bdf8;
      font-size: 22px;
      margin: 10px 0;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

<h1>🌿 ZenoriaMC Rank Store</h1>
<p>Pilih rank favorit kamu!</p>

<div class="container">

  <div class="card">
    <h2>VIP</h2>
    <p class="price">Rp10.000</p>
    <p>✔ Kit VIP<br>✔ Prefix<br>✔ 2x reward</p>
    <button onclick="window.location.href='https://discord.gg/yourlink'">Buy</button>
  </div>

  <div class="card">
    <h2>MVP</h2>
    <p class="price">Rp25.000</p>
    <p>✔ Semua VIP<br>✔ Fly<br>✔ 3x reward</p>
    <button onclick="window.location.href='https://discord.gg/yourlink'">Buy</button>
  </div>

  <div class="card">
    <h2>SULTAN</h2>
    <p class="price">Rp50.000</p>
    <p>✔ Semua MVP<br>✔ Kit OP<br>✔ Tag Khusus</p>
    <button onclick="window.location.href='https://discord.gg/yourlink'">Buy</button>
  </div>

</div>

</body>
  </html>
