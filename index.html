<!DOCTYPE html>
<html>
<head>
  <title>ZEN STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      height: 100vh;
      color: white;
      overflow: hidden;
      background: linear-gradient(135deg, #020617, #0f172a);
      transition: 0.5s;
    }

    /* NAVBAR */
    .navbar {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 25px;
      cursor: pointer;
    }

    .menu {
      position: absolute;
      top: 50px;
      left: 10px;
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    .menu div {
      padding: 10px;
      cursor: pointer;
    }

    .menu div:hover {
      background: #334155;
    }

    /* CONTAINER */
    .container {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 90%;
      max-width: 500px;
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #22c55e;
      text-shadow: 0 0 10px #22c55e;
    }

    .info {
      margin: 10px 0;
      font-size: 14px;
    }

    .card {
      background: #1e293b;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #334155;
      transform: scale(1.05);
    }

    /* BUBBLE */
    .bubble {
      position: absolute;
      bottom: -50px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      animation: naik 10s infinite;
    }

    @keyframes naik {
      0% { transform: translateY(0); }
      100% { transform: translateY(-110vh); }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
  <div onclick="alert('Halaman Profile nanti')">👤 Profile</div>
  <div onclick="alert('Halaman Wiki nanti')">📖 Wiki</div>
  <div onclick="gantiWarna()">🎨 Setting</div>
</div>

<!-- BUBBLE -->
<div class="bubble" style="left:10%; width:20px; height:20px;"></div>
<div class="bubble" style="left:40%; width:15px; height:15px;"></div>
<div class="bubble" style="left:70%; width:25px; height:25px;"></div>

<!-- CONTENT -->
<div class="container">
  <div class="box">

    <h1>ZEN STORE</h1>
    <p>Welcome to official ZENORIAMC</p>

    <div class="info">IP: ZenoriaMC.arqonara.my.id</div>
    <div class="info">Port: 25483</div>
    <div class="info">Status: 🟢 Online 24 Jam</div>

    <!-- MENU BOX -->
    <div class="card" onclick="window.location.href='rank/'">
      🛒 Server Store
    </div>

    <div class="card" onclick="alert('Vote belum tersedia')">
      🗳️ Vote
    </div>

    <div class="card" onclick="window.open('https://sociabuzz.com/asepajaweh/tribe')">
      💖 Donation
    </div>

  </div>
</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function gantiWarna() {
  let warna = prompt("Masukkan warna (contoh: blue, #ff0000)");
  document.body.style.background = warna;
}
</script>

</body>
</html>
