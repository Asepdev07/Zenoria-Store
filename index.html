<!DOCTYPE html>
<html>
<head>
  <title>ZenoriaMC Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;

      /* Background gradient + animasi */
      background: linear-gradient(135deg, #020617, #0f172a, #020617);
      background-size: 400% 400%;
      animation: bgMove 12s infinite alternate;
    }

    @keyframes bgMove {
      0% { background-position: left; }
      100% { background-position: right; }
    }

    /* Card utama (glass effect) */
    .container {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      padding: 50px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 45px;
      margin-bottom: 10px;

      /* Glow text */
      color: #22c55e;
      text-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
    }

    p {
      color: #94a3b8;
      margin-bottom: 40px;
    }

    .btn {
      background: linear-gradient(45deg, #22c55e, #16a34a);
      padding: 15px 35px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      display: inline-block;
      transition: 0.3s;

      /* Glow tombol */
      box-shadow: 0 0 15px #22c55e;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #22c55e, 0 0 50px #22c55e;
    }

    /* Particle kecil */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 10s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-100vh); }
    }
  </style>
</head>

<body>

<!-- Particle background -->
<div class="circle" style="width: 20px; height: 20px; left: 20%; bottom: -50px;"></div>
<div class="circle" style="width: 15px; height: 15px; left: 50%; bottom: -60px;"></div>
<div class="circle" style="width: 25px; height: 25px; left: 80%; bottom: -70px;"></div>

<div class="container">

  <h1>🌿 ZENORIA SHOP</h1>
  <p>Official Store ZenoriaMC</p>

  <!-- Tombol utama -->
  <div class="btn" onclick="window.location.href='rank/'">
    🛒 Buka Rank Shop
  </div>

</div>

</body>
</html>
