<!DOCTYPE html>
<html>
<head>
  <title>ZEN STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;

      background: linear-gradient(135deg, #020617, #0f172a, #020617);
      background-size: 400% 400%;
      animation: bg 10s infinite alternate;
    }

    @keyframes bg {
      0% { background-position: left; }
      100% { background-position: right; }
    }

    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 35px;
      color: #22c55e;
      text-shadow: 0 0 10px #22c55e;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .info {
      margin: 10px 0;
      font-size: 14px;
      color: #cbd5f5;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
    }

    .btn {
      background: #22c55e;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
      box-shadow: 0 0 15px #22c55e;
    }

    .about {
      margin-top: 15px;
      font-size: 13px;
      color: #94a3b8;
    }

    .status-online {
      color: #22c55e;
    }

    .status-offline {
      color: red;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>ZEN STORE</h1>
  <p class="subtitle">Welcome to official ZENORIAMC</p>

  <div class="box">
    <div class="info">IP: ZenoriaMC.arqonara.my.id</div>
    <div class="info">Port: 25483</div>
    <div class="info">Status: <span id="status">Loading...</span></div>
    <div class="info">Player Online: <span id="player">Loading...</span></div>
    <div class="info">Tanggal: <span id="tanggal"></span></div>
  </div>

  <!-- MENU -->
  <div class="btn" onclick="window.location.href='rank/'">
    🛒 Server Store
  </div>

  <div class="btn" onclick="alert('Vote belum tersedia')">
    🗳️ Vote
  </div>

  <div class="btn" onclick="window.open('https://sociabuzz.com/asepajaweh/tribe')">
    💖 Donation
  </div>

  <!-- ABOUT -->
  <div class="about">
    ZenoriaMC adalah server Survival Economy RPG dengan fitur unik, sistem rank, crate, dan komunitas aktif.
  </div>

</div>

<script>
  // Tanggal otomatis
  let tgl = new Date();
  document.getElementById("tanggal").innerHTML = tgl.toLocaleDateString();

  // Ambil data server real
  fetch("https://api.mcsrvstat.us/2/ZenoriaMC.arqonara.my.id:25483")
    .then(res => res.json())
    .then(data => {

      if (data.online) {
        document.getElementById("status").innerHTML = "<span class='status-online'>🟢 Online</span>";
        document.getElementById("player").innerHTML = data.players.online + " / " + data.players.max;
      } else {
        document.getElementById("status").innerHTML = "<span class='status-offline'>🔴 Offline</span>";
        document.getElementById("player").innerHTML = "-";
      }

    })
    .catch(() => {
      document.getElementById("status").innerHTML = "Error";
      document.getElementById("player").innerHTML = "Error";
    });
</script>

</body>
  </html>
