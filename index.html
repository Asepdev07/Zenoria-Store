<!DOCTYPE html>
<html>
<head>
  <title>ZenoriaMC Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh; /* # Full tinggi layar */
      display: flex;
      justify-content: center; /* # Tengah horizontal */
      align-items: center;     /* # Tengah vertikal */
      font-family: Arial;
      color: white;

      /* # Background gradasi gelap */
      background: linear-gradient(135deg, #020617, #0f172a, #020617);
      background-size: 400% 400%;
      animation: bgMove 10s infinite alternate;
    }

    /* # Animasi background */
    @keyframes bgMove {
      0% { background-position: left; }
      100% { background-position: right; }
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .btn {
      background: #22c55e;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      display: inline-block;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.1);
      box-shadow: 0 0 20px #22c55e;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🌿 ZENORIA SHOP</h1>
  <p>Welcome to official ZenoriaMC Store</p>

  <!-- # Tombol ke rank -->
  <div class="btn" onclick="window.location.href='rank/'">
    🛒 Buka Rank Shop
  </div>

</div>

</body>
</html>
